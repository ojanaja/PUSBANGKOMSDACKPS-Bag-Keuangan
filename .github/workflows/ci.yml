name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.sum

      - name: Run full checks (no docker compose build)
        env:
          NODE_IMAGE: node:22-alpine
        run: |
          mkdir -p reports
          make prebuild-all 2>&1 | tee reports/prebuild-all.log

      - name: Generate backend coverage report
        run: |
          mkdir -p reports
          bash ./scripts/backend-check.sh coverage 2>&1 | tee reports/backend-coverage.log

      - name: Upload validate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-reports-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            reports/*.log
            backend/coverage.out

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker images
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          mkdir -p reports
          docker compose -f docker-compose.yml build 2>&1 | tee reports/docker-build.log

      - name: Upload docker build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-logs-${{ github.run_id }}
          if-no-files-found: warn
          path: reports/docker-build.log
